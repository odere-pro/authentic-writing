name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: plugin.json is valid JSON
        run: jq -e . .claude-plugin/plugin.json
      - name: hooks.json is valid JSON
        run: jq -e . hooks/hooks.json
      - name: format fixtures pass
        run: node skills/authentic-writing/scripts/validate-examples.mjs
